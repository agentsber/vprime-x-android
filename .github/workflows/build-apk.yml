name: Build VPrime X APK

on:
  workflow_dispatch:
    inputs:
      build_variant:
        description: 'Build variant (flavor + type)'
        required: true
        default: 'playProdRelease'
        type: choice
        options:
          - playProdRelease
          - githubProdRelease
          - playProdDebug

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.p12
          echo "Keystore decoded: $(ls -lh ${{ github.workspace }}/release.p12)"

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assemble${{ github.event.inputs.build_variant }} \
            -PstoreFile="${{ github.workspace }}/release.p12" \
            -PstorePassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PkeyAlias="${{ secrets.KEY_ALIAS }}" \
            -PkeyPassword="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon \
            --stacktrace \
            --info 2>&1 | tail -100

      - name: Find APKs
        id: find_apk
        run: |
          echo "=== All APKs ==="
          find . -name "*.apk" -path "*/outputs/apk/*" | sort
          APK=$(find . -name "*.apk" -path "*/outputs/apk/*" | grep -v "unsigned" | grep -v "test" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Selected: $APK"
          ls -lh "$APK"

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VPrime-X-${{ github.event.inputs.build_variant }}-${{ github.run_number }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "VPrime X — Build #${{ github.run_number }} (${{ github.event.inputs.build_variant }})"
          draft: false
          prerelease: true
          files: ${{ steps.find_apk.outputs.apk_path }}
